name: tapz
description: "A Flutter app for ScanPay functionality with QR code scanning and payments."

publish_to: 'none'

version: 1.1.0+6

environment:
  sdk: '>=3.7.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase Dependencies
  firebase_core: ^4.1.0
  firebase_auth: ^6.0.2
  cloud_firestore: ^6.0.1
  firebase_ui_auth: ^3.0.0
  cloud_functions: ^6.0.1

  # Camera & QR Scanning
  camera: ^0.11.2
  mobile_scanner: ^7.0.1

  # Database & Storage
  sqflite: ^2.2.0+3
  shared_preferences: ^2.0.15
  json_annotation: ^4.8.0

  # Maps & Location
  google_maps_flutter: ^2.2.1
  geolocator: ^14.0.2

  # Web & Payment
  webview_flutter: ^4.0.2
  flutter_inappwebview: ^6.1.5

  qr_flutter: ^4.0.0

  # UI Components
  cached_network_image: ^3.2.3
  connectivity_plus: ^6.1.5

  # Utilities
  url_launcher: ^6.1.7
  intl: ^0.20.2
  http: ^1.5.0
  provider: ^6.1.1
  carousel_slider: ^5.1.1
  pin_code_fields: ^8.0.1
  printing: ^5.14.2
  pdf: ^3.11.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/icon/app_icon.png

# Flutter Launcher Icons Configuration
flutter_launcher_icons:
  ios: true
  android: false
  image_path: "assets/icon/app_icon.png"

# Flutter Native Splash Configuration
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icon/app_icon.png

  ios: true
  android: true

  fullscreen: true